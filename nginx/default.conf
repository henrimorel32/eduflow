# ==========================================
# REDIRECTION HTTP → HTTPS
# ==========================================
server {
    listen 80;
    server_name localhost;
    
    root /var/www/html/public;
    index index.php index.html;
    
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    # =====================================================
    # FICHIERS STATIQUES SEO (prioritaires - en HAUT)
    # =====================================================
    
    # robots.txt - fichier statique
    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }


    # =====================================================
    # CHOIX : Sitemap statique OU dynamique
    # =====================================================
    
    # OPTION A: Sitemap statique (sitemap.xml existe physiquement)
    location = /sitemap.xml {
        try_files $uri =404;
        access_log off;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
    
    # OPTION B: Sitemap dynamique (décommente si tu utilises sitemap.php)
    # location = /sitemap.xml {
    #     rewrite ^ /sitemap.php last;
    # }

    # =====================================================
    # REWRITE - URLs propres
    # =====================================================
    
    location / {
        # Essayer fichier, dossier, sinon rewriter
        try_files $uri $uri/ @rewrite;
    }
    
    # Règle de rewrite explicite
    location @rewrite {
        rewrite ^/(.*)$ /index.php?page=$1 last;
    }
    
    # Page d'accueil sans path
    location = / {
        try_files /index.php =404;
        fastcgi_param QUERY_STRING "page=home";
        include fastcgi_params;
        fastcgi_pass php:9000;  # ou php:9000 si Docker
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # =====================================================
    # PHP-FPM
    # =====================================================
    
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;  # ← ADAPTE ICI (php:9000 si Docker)
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
    
    # =====================================================
    # ASSETS
    # =====================================================
    
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 6M;
        access_log off;
        try_files $uri =404;
    }
    
    location ~ /\. {
        deny all;
    }
}

