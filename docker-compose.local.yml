version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: edu_nginx_dev
    restart: unless-stopped
    ports:
      - "8081:80"   # 👈 accès direct
    volumes:
      - ./php/src:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - edu_network

  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: edu_php_dev
    restart: unless-stopped
    volumes:
      - ./php/src:/var/www/html
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
    depends_on:
      - mysql
    networks:
      - edu_network

  mysql:
    image: mysql:8.0
    container_name: edu_mysql_dev
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mysql_data_dev:/var/lib/mysql
    ports:
      - "3306:3306"   # 👈 accessible depuis ton host
    networks:
      - edu_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: edu_phpmyadmin_dev
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8080:80"   # 👈 http://localhost:8080
    depends_on:
      - mysql
    networks:
      - edu_network

volumes:
  mysql_data_dev:

networks:
  edu_network:
    driver: bridge