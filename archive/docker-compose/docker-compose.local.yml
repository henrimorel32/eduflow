# ============================================================
# Docker Compose pour DEVELOPPEMENT LOCAL
# ============================================================
# Usage: docker-compose -f docker-compose.local.yml up -d
# 
# Ce fichier utilise automatiquement .env.local (pas .env)
# Pour forcer l'utilisation de .env.local explicitement:
#   docker-compose -f docker-compose.local.yml --env-file .env.local up -d
# ============================================================

services:
  # Nginx - exposé sur port 8081 (localhost uniquement)
  nginx:
    image: nginx:alpine
    container_name: edu_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"  # Localhost uniquement pour sécurité
    volumes:
      - ./php/src:/var/www/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - php
    networks:
      - edu_network
    # PAS de labels Traefik en local

  # PHP-FPM
  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: edu_php
    restart: unless-stopped
    volumes:
      - ./php/src:/var/www/html
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
    depends_on:
      - mysql
    networks:
      - edu_network

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: edu_mysql
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - edu_network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: edu_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - mysql
    networks:
      - edu_network

volumes:
  mysql_data:

networks:
  edu_network:
    driver: bridge
