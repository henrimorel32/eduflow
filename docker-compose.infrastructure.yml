# ============================================================
# NOUVEAUX SERVICES - Multi-école
# ============================================================
# Ce fichier ajoute PostgreSQL et Redis pour les écoles Next.js
# SANS toucher au site PHP existant sur henrimorel.com
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.new-services.yml up -d
#
# Ou mieux, copier ce fichier sur le serveur et lancer:
#   docker-compose -f docker-compose.new-services.yml up -d
# ============================================================

version: '3.8'

services:
  # ============================================================
  # POSTGRESQL - Base de données pour les écoles Next.js
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: edu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edu_platform
      POSTGRES_USER: edu_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD manquant dans .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - edu_internal
      - edu_proxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edu_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # REDIS - Cache et sessions
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: edu_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - edu_internal
      - edu_proxy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # QUEUE API - Pont PHP vers Redis/BullMQ
  # ============================================================
  queue-api:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    container_name: edu_queue_api
    restart: unless-stopped
    command: ["node", "queue-api.js"]
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_API_PORT: 3001
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./scripts:/app:ro
      - /app/node_modules
    networks:
      - edu_internal
      - edu_network
    depends_on:
      - redis

  # ============================================================
  # WORKER - Traite les jobs de déploiement Docker
  # ============================================================
  worker:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    container_name: edu_worker
    restart: unless-stopped
    command: ["node", "worker.js"]
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_CONCURRENCY: 2
      APPS_BASE_DIR: /opt/docker/apps
      UPLOADS_BASE_DIR: /opt/docker/php-uploads
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/app
      - /app/node_modules
      - ./nextjs-template:/opt/docker/apps/eduflow/nextjs-template:ro
      - /opt/docker/apps:/opt/docker/apps
      - ./php/src/uploads:/opt/docker/php-uploads/uploads:ro
    networks:
      - edu_internal
    depends_on:
      - redis

  # ============================================================
  # ADMINER - Gestion BDD (localhost uniquement)
  # ============================================================
  adminer:
    image: adminer:latest
    container_name: edu_adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "127.0.0.1:8082:8080"
    networks:
      - edu_internal
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

networks:
  edu_internal:
    driver: bridge
    name: eduflow_edu_internal
  edu_proxy:
    external: true
