# Exemple de docker-compose pour une école
# Copier et adapter pour chaque nouvelle école

services:
  school_{SCHOOL_SLUG}:
    image: node:20-alpine
    container_name: school_{SCHOOL_SLUG}
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run build && npx next start -H 0.0.0.0"
    environment:
      - SCHOOL_SLUG=${SCHOOL_SLUG}
      - SCHOOL_NAME=${SCHOOL_NAME}
      - SCHOOL_COLOR_PRIMARY=${COLOR_PRIMARY:-#2563eb}
      - SCHOOL_COLOR_SECONDARY=${COLOR_SECONDARY:-#06b6d4}
      - SCHOOL_DOMAIN=${DOMAIN}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - PORT=3000
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
    volumes:
      - /opt/docker/apps/eduflow/nextjs-template:/app:ro
    networks:
      - eduflow_edu_internal
      - edu_proxy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  eduflow_edu_internal:
    external: true
  edu_proxy:
    external: true
