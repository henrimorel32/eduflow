services:
  traefik:
    image: traefik:v3.2
    container_name: traefik
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.40
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN:-}
      - CF_API_EMAIL=${CF_API_EMAIL:-henri@henrimorel.com}
    command:
      - --configFile=/traefik.yml
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Dashboard (sécuriser en prod)
    volumes:
      - ./traefik.yml:/traefik.yml:ro
      - ./dynamic:/dynamic:ro
      - ./letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Optionnel: pour Docker provider
    networks:
      - edu_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`traefik.henrimorel.com`)"
      - "traefik.http.routers.api.service=api@internal"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.middlewares=auth@file"  # Auth basique
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  edu_proxy:
    name: edu_proxy
    driver: bridge
