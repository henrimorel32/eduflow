---
# Setup Ubuntu 22.04 - Sécurité + Docker 24.x + User henri

- name: Setup serveur Ubuntu 22.04
  hosts: production
  become: yes
  vars:
    admin_user: henri
    ssh_port: 2222
    admin_ssh_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFuYQzY/qkgrd2eql/7u1FDwHcMTvj3aqFEpMOkPBV1s henri@dev-local"
      - "ssh-rsa  henri@henrimorel.com"

  tasks:
    # Mise à jour système
    - name: Update packages
      apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Install base packages
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - tree
          - unzip
          - jq
          - ncdu
          - net-tools
          - dnsutils
          - logrotate
          - chrony
          - ufw
          - fail2ban
        state: present

    # Timezone
    - name: Set timezone
      timezone:
        name: Europe/Paris

    # Create user henri
    - name: Create user henri
      user:
        name: "{{ admin_user }}"
        shell: /bin/bash
        groups: sudo
        append: yes
        create_home: yes

    - name: Create .ssh directory
      file:
        path: "/home/{{ admin_user }}/.ssh"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: '0700'

    - name: Add SSH keys
      authorized_key:
        user: "{{ admin_user }}"
        key: "{{ item }}"
        state: present
      loop: "{{ admin_ssh_keys }}"

    - name: Sudo without password
      copy:
        dest: "/etc/sudoers.d/{{ admin_user }}"
        content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
        mode: '0440'
        validate: 'visudo -cf %s'

    # SSH hardening
    - name: Configure SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^AllowUsers', line: 'AllowUsers {{ admin_user }}' }
        - { regexp: '^#?Port ', line: 'Port {{ ssh_port }}' }
        - { regexp: '^PubkeyAuthentication', line: 'PubkeyAuthentication yes' }

    - name: Restart SSH
      systemd:
        name: ssh
        state: restarted

    # UFW
    - name: Configure UFW
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "{{ ssh_port }}"
        - '80'
        - '443'

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny
        direction: incoming

    # Fail2ban
    - name: Configure fail2ban
      copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          maxretry = 3
          bantime = 3600
          findtime = 600
          
          [sshd]
          enabled = true
          port = {{ ssh_port }}
          filter = sshd
          logpath = /var/log/auth.log

    - name: Start fail2ban
      systemd:
        name: fail2ban
        enabled: yes
        state: started

    # Docker 24.x
    - name: Install Docker dependencies
      apt:
        name:
          - ca-certificates
          - gnupg
        state: present

    - name: Create keyrings dir
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker repo
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu jammy stable"
        state: present

    - name: Update apt
      apt:
        update_cache: yes

    - name: Install Docker 24.x
      apt:
        name:
          - docker-ce=5:24.0.7-1~ubuntu.22.04~jammy
          - docker-ce-cli=5:24.0.7-1~ubuntu.22.04~jammy
          - containerd.io
          - docker-compose-plugin
        state: present
        allow_downgrade: yes

    - name: Add henri to docker group
      user:
        name: "{{ admin_user }}"
        groups: docker
        append: yes

    - name: Start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    # Disable ubuntu user
    - name: Lock ubuntu account
      user:
        name: ubuntu
        password: '*'
        shell: /usr/sbin/nologin

    - name: Summary
      debug:
        msg:
          - "=========================================="
          - "  Setup terminé !"
          - "=========================================="
          - "SSH: ssh -p {{ ssh_port }} {{ admin_user }}@{{ ansible_host }}"
          - "Docker: {{ 'docker version' }}"
          - "=========================================="
